version: 2

models:
  - name: stg_platform_order
    description: |
      **Staging Layer - Platform Order (1:1 with Bronze)**

      Cleans and type-casts raw order data from Bronze layer.
      No deduplication, no surrogate keys — raw data with standardized NULLs and proper types.

      **Source:** bronze.platform_order

      **Transformations:**
      - NULL standardization (empty strings, 'NULL', '-' -> SQL NULL)
      - Type casting to appropriate data types via std_cast macro

      **What stays in Silver:**
      - Deduplication logic
      - Surrogate key generation
      - Data quality flags
      - Business logic (aggregation by composite key)

    data_tests:
      - no_cast_failures:
          config:
            severity: warn

    columns:
      # === Key Business Columns ===
      - name: internal_order_number
        description: "Internal order number — part of composite key"
        data_tests:
          - not_null:
              config:
                severity: warn

      - name: product_code
        description: "Product code/SKU — part of composite key"
        data_tests:
          - not_null:
              config:
                severity: warn

      - name: online_order_number
        description: "Online order number from marketplace platform"

      - name: order_status
        description: "Order status"

      - name: order_time
        description: "Order creation timestamp"

      - name: payment_time
        description: "Payment timestamp"

      - name: platform
        description: "Marketplace platform name"

      - name: store
        description: "Store name"

      # === Metadata (Bronze) ===
      - name: _source_file_path
        description: "Source file path from Bronze layer"
        data_tests:
          - not_null:
              config:
                severity: warn

      - name: _batch_id
        description: "Batch ID from Bronze layer"
        data_tests:
          - not_null:
              config:
                severity: warn

      - name: _loaded_at
        description: "Load timestamp from Bronze layer"
        data_tests:
          - not_null:
              config:
                severity: warn
